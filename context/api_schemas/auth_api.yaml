openapi: "3.0.3"
info:
  title: Auth API
  version: "1.0.0"
paths:
  /api/auth/login:
    post:
      summary: Authenticate user with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      name:
                        type: string
        "401":
          description: Invalid credentials
        "422":
          description: Validation error
        "429":
          description: Too many login attempts

  /api/auth/register:
    post:
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, confirmPassword]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                confirmPassword:
                  type: string
      responses:
        "201":
          description: Registration successful
        "409":
          description: Email already registered
        "422":
          description: Validation error

  /api/auth/logout:
    post:
      summary: Invalidate current session
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
        "401":
          description: Not authenticated
