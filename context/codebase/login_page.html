<!-- Login page template (simplified for context) -->
<div class="auth-container" data-testid="login-container">
  <h1 data-testid="login-title">Sign In</h1>
  <form data-testid="login-form" action="/api/auth/login" method="POST">
    <div class="form-group">
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        data-testid="email-input"
        placeholder="Enter your email"
        required
        autocomplete="email"
      />
      <span class="error-message" data-testid="email-error"></span>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        data-testid="password-input"
        placeholder="Enter your password"
        required
        minlength="8"
        autocomplete="current-password"
      />
      <span class="error-message" data-testid="password-error"></span>
    </div>

    <div class="form-group">
      <label>
        <input type="checkbox" name="remember" data-testid="remember-checkbox" />
        Remember me
      </label>
    </div>

    <button type="submit" data-testid="login-submit-btn" class="btn btn-primary">
      Sign In
    </button>

    <div class="error-banner" data-testid="login-error-banner" style="display:none">
      <!-- Server-side error messages appear here -->
    </div>

    <p class="auth-link">
      Don't have an account?
      <a href="/register" data-testid="register-link">Sign up</a>
    </p>
    <p class="auth-link">
      <a href="/forgot-password" data-testid="forgot-password-link">Forgot password?</a>
    </p>
  </form>
</div>
